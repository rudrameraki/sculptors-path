<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Path">
<meta name="theme-color" content="#080604">
<title>The Sculptor's Path</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080604; --bg2:#0f0d08; --bg3:#16130d; --bg4:#1e1a11;
  --gold:#c8a45a; --gold2:#e8c878; --gold3:#f8e8a8; --gold-dim:#6a5228;
  --ember:#d4601a; --ember2:#f07828; --jade:#4a8060;
  --text:#ede0c4; --text-dim:#9a8060; --text-faint:#4a3c24;
  --border:rgba(200,164,90,0.12); --borderf:rgba(255,255,255,0.035);
  --ink:#1a1408;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'IM Fell English',Georgia,serif;font-size:15px;line-height:1.55;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;position:relative}

/* ── Grain overlay ── */
#app::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}

/* ── Header ── */
#hdr{padding:16px 20px 0;text-align:center;flex-shrink:0;position:relative;z-index:1}
.om{font-size:14px;color:var(--gold-dim);animation:breathe 5s ease-in-out infinite;letter-spacing:6px}
@keyframes breathe{0%,100%{opacity:.2}50%{opacity:.5}}
.eyebrow{font-family:'Cinzel',serif;font-size:7px;letter-spacing:5px;color:var(--text-faint);text-transform:uppercase;margin:3px 0}
h1{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold2);letter-spacing:2px;font-weight:400;text-shadow:0 0 30px rgba(200,164,90,0.3)}
.hdr-orn{display:flex;align-items:center;gap:10px;margin:8px 20px 0}
.hdr-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim) 40%,var(--gold-dim) 60%,transparent)}
.hdr-gem{width:5px;height:5px;background:var(--gold-dim);transform:rotate(45deg);flex-shrink:0}

/* ── Nav ── */
#nav{display:flex;padding:8px 8px 0;gap:2px;flex-shrink:0;position:relative;z-index:1}
.ntab{flex:1;padding:7px 1px 6px;background:transparent;border:1px solid transparent;border-radius:6px;
  font-family:'Cinzel',serif;font-size:6.5px;letter-spacing:.3px;color:var(--text-faint);
  cursor:pointer;text-transform:uppercase;transition:all .25s;line-height:1.3;text-align:center}
.ntab span{display:block;font-size:11px;margin-bottom:2px}
.ntab.active{background:rgba(200,164,90,0.08);border-color:rgba(200,164,90,0.18);color:var(--gold);
  box-shadow:inset 0 1px 0 rgba(200,164,90,0.1)}

/* ── Content ── */
#content{flex:1;overflow-y:auto;padding:12px 13px 14px;position:relative;z-index:1;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{display:none}

/* ── Footer ── */
#ftr{flex-shrink:0;padding:5px 20px 8px;border-top:1px solid var(--borderf);position:relative;z-index:1;
  text-align:center;font-family:'Cinzel',serif;font-size:6px;letter-spacing:2.5px;color:var(--text-faint);text-transform:uppercase}

/* ── Section headers ── */
.sec-head{text-align:center;margin-bottom:12px}
.sec-lesson{font-family:'Cinzel',serif;font-size:7px;letter-spacing:4px;color:var(--text-faint);text-transform:uppercase;margin-bottom:3px}
.sec-title{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--gold);letter-spacing:1px;font-weight:400}
.sec-sub{font-size:11px;color:var(--text-faint);font-style:italic;margin-top:3px}

/* ── Cards ── */
.card{background:var(--bg3);border:1px solid var(--borderf);border-radius:12px;padding:12px;
  margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card.done{background:rgba(200,164,90,0.06);border-color:rgba(200,164,90,0.18)}
.card:active{transform:scale(0.984)}
.cglow{position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(212,96,26,.2),transparent 70%);opacity:0;transition:opacity .5s;pointer-events:none}

/* ── Habit row ── */
.hrow{display:flex;align-items:center;gap:10px}
.hinfo{flex:1;min-width:0}
.hname{font-size:13px;color:var(--text);font-weight:600;line-height:1.3}
.hanchor{font-size:10px;color:var(--text-faint);font-style:italic;margin-top:2px}
.hchk{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.hchk.done{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.pb{margin-top:8px}
.pm{display:flex;justify-content:space-between;margin-bottom:3px}
.pstage{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase}
.pcnt{font-size:10px;color:var(--text-faint)}
.pt{height:1.5px;background:rgba(255,255,255,0.04);border-radius:2px}
.pf{height:100%;border-radius:2px;transition:width 1s ease}
.wdots{display:flex;gap:3px;margin-top:6px}
.wd{flex:1;height:2.5px;border-radius:2px;background:rgba(255,255,255,0.04);transition:background .3s}
.wd.on{background:var(--gold)}
.mastered-badge{font-family:'Cinzel',serif;font-size:6.5px;color:var(--gold);letter-spacing:1px;
  border:1px solid rgba(200,164,90,0.25);padding:1px 5px;border-radius:6px;margin-left:5px;vertical-align:middle}

/* ── Sumbar ── */
.sumbar{text-align:center;margin-bottom:12px;padding:10px;background:var(--bg3);border:1px solid var(--borderf);border-radius:10px}
.sumnum{font-family:'Cinzel Decorative',serif;font-size:24px;color:var(--gold2)}
.sumlbl{font-family:'Cinzel',serif;font-size:7px;letter-spacing:3px;color:var(--text-faint);text-transform:uppercase;margin-top:2px}

/* ── Stats row ── */
.stats-row{display:flex;gap:7px;margin-bottom:12px}
.stat-box{flex:1;background:var(--bg3);border:1px solid var(--borderf);border-radius:10px;padding:9px 6px;text-align:center}
.stat-n{font-family:'Cinzel Decorative',serif;font-size:17px;color:var(--gold2)}
.stat-l{font-family:'Cinzel',serif;font-size:6.5px;letter-spacing:1.5px;color:var(--text-faint);text-transform:uppercase;margin-top:2px}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 11px;border-radius:18px;cursor:pointer;background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.05);font-size:11px;color:var(--text-faint);transition:all .15s;font-family:inherit}
.chip.active{background:rgba(200,164,90,0.12);border-color:rgba(200,164,90,0.25);color:var(--gold)}

/* ── Form ── */
.fsec{margin-bottom:14px}
.fl{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:2.5px;color:var(--text-faint);
  text-transform:uppercase;display:block;margin-bottom:6px}
.fi{width:100%;padding:10px 12px;border-radius:9px;background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.06);color:var(--text);font-size:13px;
  font-family:'IM Fell English',Georgia,serif;outline:none;transition:border-color .2s}
.fi:focus{border-color:rgba(200,164,90,0.25)}
.fi::placeholder{color:var(--text-faint);font-style:italic}
.fhint{font-size:10px;color:var(--text-faint);font-style:italic;margin-top:4px;padding-left:2px}
.coach{margin-top:10px;background:rgba(140,40,10,0.1);border:1px solid rgba(140,40,10,0.25);border-radius:11px;padding:13px;animation:fadeUp .3s ease}
.coach-t{font-family:'Cinzel',serif;font-size:9px;color:#b04020;letter-spacing:1px;margin-bottom:6px}
.coach-b{font-size:12px;color:#806050;line-height:1.7;margin-bottom:10px}
.coach-a{width:100%;padding:9px;border-radius:9px;border:none;cursor:pointer;background:rgba(200,164,90,0.1);color:var(--gold);font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase}
.sbtn{width:100%;padding:12px;border-radius:11px;border:none;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;transition:all .2s;margin-top:4px}
.sbtn.on{background:rgba(200,164,90,0.15);color:var(--gold);border:1px solid rgba(200,164,90,0.2)}
.sbtn.off{background:rgba(255,255,255,0.02);color:var(--text-faint);cursor:not-allowed;border:1px solid transparent}
.prev-card{background:rgba(200,164,90,0.04);border:1px solid rgba(200,164,90,0.14);border-radius:11px;padding:12px;margin-bottom:14px;display:flex;gap:12px;align-items:center;animation:fadeUp .3s ease}

/* ── Trophy panel ── */
.trophy-panel{margin-top:16px;padding-top:14px;border-top:1px solid var(--borderf)}
.trophy-head{font-family:'Cinzel',serif;font-size:7px;letter-spacing:4px;color:var(--text-faint);text-transform:uppercase;text-align:center;margin-bottom:10px}
.trophy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.trophy-item{background:rgba(200,164,90,0.05);border:1px solid rgba(200,164,90,0.18);border-radius:11px;padding:12px 6px 10px;text-align:center;position:relative}
.trophy-deity-name{font-size:10px;color:var(--gold);margin-top:5px;font-family:'Cinzel',serif;letter-spacing:.5px}
.trophy-habit{font-size:9px;color:var(--text-faint);font-style:italic;margin-top:2px;line-height:1.3}

/* ── Pudhayal ── */
.pud-btn{width:130px;height:130px;border-radius:50%;border:none;cursor:pointer;
  background:radial-gradient(circle at 36% 30%,#f0dc88,#c89828 50%,#7a5808);
  box-shadow:0 0 50px rgba(200,152,40,.25),0 8px 28px rgba(0,0,0,.7),inset 0 2px 8px rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;margin:0 auto;
  transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden}
.pud-btn:active{transform:scale(0.91);box-shadow:0 0 16px rgba(200,152,40,.1),0 3px 10px rgba(0,0,0,.5)}
.pfill-track{height:6px;background:rgba(255,255,255,0.04);border-radius:20px;overflow:hidden;margin:6px 0}
.pfill-bar{height:100%;border-radius:20px;background:linear-gradient(90deg,#c89828,#f0d850,#c89828);
  background-size:200%;animation:shimmer 2.5s linear infinite;transition:width .6s ease}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.wisdom-card{background:rgba(200,164,90,0.04);border:1px solid rgba(200,164,90,0.12);border-radius:11px;
  padding:14px 16px;margin:12px 0;animation:fadeUp .4s ease}
.wisdom-text{font-size:13px;color:var(--text-dim);font-style:italic;line-height:1.8;text-align:center}
.wisdom-attr{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:2px;color:var(--text-faint);text-transform:uppercase;text-align:center;margin-top:8px}
.pot-shelf{margin-top:14px}
.pot-shelf-title{font-family:'Cinzel',serif;font-size:7px;letter-spacing:3px;color:var(--text-faint);text-transform:uppercase;text-align:center;margin-bottom:9px}
.pots-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.pot-item{text-align:center;width:56px}
.pot-lbl{font-family:'Cinzel',serif;font-size:6.5px;color:var(--gold);letter-spacing:.5px;margin-top:3px;text-transform:uppercase}
@keyframes coinFly{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0.2)}}
.coin-burst{position:fixed;pointer-events:none;font-size:14px;z-index:9999;animation:coinFly .7s ease-out forwards}

/* ── Havan ── */
.havan-tabs{display:flex;gap:6px;margin-bottom:12px}
.htab{flex:1;padding:8px 4px;border-radius:9px;border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.02);cursor:pointer;text-align:center;font-family:'Cinzel',serif;
  font-size:8px;letter-spacing:1px;color:var(--text-faint);text-transform:uppercase;transition:all .2s}
.htab.active{background:rgba(212,96,26,0.1);border-color:rgba(212,96,26,0.25);color:#d07040}
.htab.active.forgive{background:rgba(100,140,200,0.08);border-color:rgba(100,140,200,0.2);color:#8ab0d8}
.havan-input{width:100%;padding:10px 12px;border-radius:9px;background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.05);color:var(--text);font-size:13px;
  font-family:'IM Fell English',Georgia,serif;outline:none;resize:none;min-height:58px}
.havan-input:focus{border-color:rgba(212,96,26,0.25)}
.havan-input.forgive:focus{border-color:rgba(100,140,200,0.2)}
.havan-offer-btn{width:100%;padding:11px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;margin-top:8px}
.havan-offer-btn.fault{background:rgba(212,96,26,0.12);color:#d07040}
.havan-offer-btn.forgive{background:rgba(100,140,200,0.1);color:#8ab0d8}
.hlog-entry{border-radius:9px;padding:9px 11px;margin-bottom:6px}
.hlog-entry.fault{background:rgba(212,96,26,0.04);border:1px solid rgba(212,96,26,0.1)}
.hlog-entry.forgive{background:rgba(100,140,200,0.04);border:1px solid rgba(100,140,200,0.1)}
.hlog-text{font-size:12px;font-style:italic}
.hlog-text.fault{color:#a06040}
.hlog-text.forgive{color:#7090b8}
.hlog-meta{font-size:8.5px;color:var(--text-faint);margin-top:2px;font-family:'Cinzel',serif;letter-spacing:.5px}
@keyframes fireFlicker{0%,100%{transform:scaleY(1) scaleX(1);transform-origin:center bottom}33%{transform:scaleY(1.04) scaleX(.97);transform-origin:center bottom}66%{transform:scaleY(.97) scaleX(1.02);transform-origin:center bottom}}
@keyframes smokeRise{0%{opacity:.5;transform:translateY(0) scaleX(1)}100%{opacity:0;transform:translateY(-35px) scaleX(1.6)}}

/* ── Garden ── */
.garden-wrap{width:100%;max-width:340px;margin:0 auto 14px;border-radius:14px;overflow:hidden;border:1px solid var(--borderf)}
.garden-input-area{background:var(--bg3);border:1px solid var(--borderf);border-radius:11px;padding:13px;margin-bottom:11px}
.garden-entry-type{display:flex;gap:5px;margin:8px 0 10px}
.gtype-btn{flex:1;padding:7px 3px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);
  background:rgba(255,255,255,0.02);cursor:pointer;text-align:center;font-size:10px;color:var(--text-faint);transition:all .15s;font-family:inherit}
.gtype-btn.active{background:rgba(74,128,96,0.14);border-color:rgba(74,128,96,0.28);color:#7abf90}
.garden-offer-btn{width:100%;padding:11px;border-radius:10px;border:none;cursor:pointer;
  background:rgba(74,128,96,0.12);color:#7abf90;font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;transition:all .2s;margin-top:0}
.glog-entry{background:rgba(74,128,96,0.04);border:1px solid rgba(74,128,96,0.1);
  border-radius:9px;padding:9px 11px;margin-bottom:6px;display:flex;gap:8px;align-items:flex-start}
.glog-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.glog-text{font-size:12px;color:#608070;font-style:italic;flex:1}
.glog-meta{font-size:8.5px;color:var(--text-faint);margin-top:2px;font-family:'Cinzel',serif;letter-spacing:.5px}

/* ── Dojo ── */
.dojo-wrap{width:100%;max-width:340px;margin:0 auto 14px;border-radius:14px;overflow:hidden;border:1px solid var(--borderf)}
.dojo-tier-btns{display:flex;gap:6px;margin:8px 0 10px}
.dojo-tier{flex:1;padding:8px 3px;border-radius:9px;border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.02);cursor:pointer;text-align:center;transition:all .2s;font-family:inherit}
.dojo-tier.active{border-color:rgba(200,164,90,0.28);background:rgba(200,164,90,0.1)}
.dojo-tier-name{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.5px;color:var(--gold);text-transform:uppercase;display:block}
.dojo-tier-sub{font-size:9px;color:var(--text-faint);font-style:italic;margin-top:1px;display:block}
.dojo-input-area{background:var(--bg3);border:1px solid var(--borderf);border-radius:11px;padding:13px;margin-bottom:11px}
.dojo-log-entry{background:rgba(200,164,90,0.03);border:1px solid rgba(200,164,90,0.09);
  border-radius:9px;padding:9px 11px;margin-bottom:6px;display:flex;gap:9px;align-items:flex-start}
.dojo-log-tier{font-size:13px;flex-shrink:0;margin-top:1px}
.dojo-log-text{font-size:12px;color:var(--text-dim);font-style:italic;flex:1}
.dojo-log-meta{font-size:8.5px;color:var(--text-faint);margin-top:2px;font-family:'Cinzel',serif;letter-spacing:.5px}
.dojo-log-btn{width:100%;padding:11px;border-radius:10px;border:none;cursor:pointer;
  background:rgba(200,164,90,0.1);color:var(--gold);font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;transition:all .2s}

/* ── Empty ── */
.empty{text-align:center;padding:28px 20px}
.ei{font-size:30px;opacity:.18;margin-bottom:11px}
.et{font-size:12px;color:var(--text-faint);font-style:italic;line-height:1.75}
.ebtn{margin-top:14px;padding:8px 20px;background:rgba(200,164,90,0.1);border:1px solid rgba(200,164,90,0.2);
  color:var(--gold);border-radius:9px;cursor:pointer;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:2px;text-transform:uppercase}

/* ── Ornament divider ── */
.orn{display:flex;align-items:center;gap:8px;margin:8px 0}
.orn-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.orn-d{font-size:7px;color:var(--gold-dim)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes chisel{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
.strike{animation:chisel .3s ease}
*{scrollbar-width:none}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="om">· ॐ ·</div>
    <div class="eyebrow">नमः शिवाय · The Ancient Path</div>
    <h1>The Sculptor's Path</h1>
    <div class="hdr-orn"><div class="hdr-line"></div><div class="hdr-gem"></div><div class="hdr-line"></div></div>
  </div>
  <div id="nav">
    <button class="ntab active" onclick="show('today')"><span>🗿</span>Sculpt</button>
    <button class="ntab" onclick="show('pudhayal')"><span>🪙</span>Goodness</button>
    <button class="ntab" onclick="show('havan')"><span>🔥</span>Havan</button>
    <button class="ntab" onclick="show('garden')"><span>🌱</span>Garden</button>
    <button class="ntab" onclick="show('dojo')"><span>⚔️</span>Dojo</button>
    <button class="ntab" onclick="show('add')"><span>+</span>Vow</button>
  </div>
  <div id="content"></div>
  <div id="ftr">ॐ नमः शिवाय · कर्म · धर्म · 66 दिन</div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const GOAL=66, KEY='path_v8';
const COINS_PER_POT=1000;
const DNAMES=['M','T','W','T','F','S','S'];

const DOMAINS=[
  {id:'spirit',    label:'Spirit',       emoji:'✿',deity:'nataraja', color:'#a898c8'},
  {id:'energy',    label:'Energy',       emoji:'⚡',deity:'hanuman',  color:'#c07840'},
  {id:'skill',     label:'Skill',        emoji:'◎',deity:'saraswati',color:'#6890b8'},
  {id:'relationships',label:'Relations', emoji:'❤',deity:'ganesha',  color:'#c8a040'},
  {id:'wealth',    label:'Wealth',       emoji:'↑',deity:'ganesha',  color:'#a8c060'},
  {id:'reputation',label:'Repute',       emoji:'★',deity:'nataraja', color:'#c8a458'},

// ─── SVG: Garden ─────────────────────────────────────────────────────────────
function gardenSVG(entries, size){
  size = size || 220;
  var total = entries.length;
  var skyL = Math.min(1, total/50);
  var id = 'gd1';
  
  // Build plants string without nested template literals
  var plants = '';
  var colors = ['#c87090','#d890a8','#f0c840','#e87030','#d070a0'];
  var greens = ['#2a5020','#3a6028','#4a7030'];
  
  for(var i=0; i < Math.min(entries.length, 30); i++){
    var e = entries[i];
    var x = 20 + (i%14)*22 + Math.sin(i*1.3)*6;
    var y = 145 - Math.floor(i/14)*18;
    var type = GARDEN_TYPES.find(function(g){ return g.id === e.type; }) || GARDEN_TYPES[0];
    var h = 8 + Math.min(i,10)*1.5;
    var col = colors[i % colors.length];
    var gr = greens[i % greens.length];
    
    if(type.plant === 'tree'){
      plants += '<g transform="translate(' + x + ',' + y + ')">';
      plants += '<rect x="-2" y="' + (-h) + '" width="4" height="' + h + '" fill="#3a2a10"/>';
      plants += '<circle cx="0" cy="' + (-h-8) + '" r="9" fill="' + gr + '" opacity="0.75"/>';
      plants += '<circle cx="-4" cy="' + (-h-5) + '" r="5" fill="#3a6028" opacity="0.55"/>';
      plants += '</g>';

      plants += '<g transform="translate(' + x + ',' + y + ')">';
      plants += '<ellipse cx="0" cy="-2" rx="7" ry="3" fill="#1a3820" opacity="0.45"/>';
      plants += '<circle cx="0" cy="' + (-h*.5-3) + '" r="5" fill="' + col + '" opacity="0.7"/>';
      plants += '</g>';
    } else if(type.plant === 'flower'){
      plants += '<g transform="translate(' + x + ',' + y + ')">';

      plants += '<circle cx="0" cy="' + (-h) + '" r="4" fill="' + col + '" opacity="0.75"/>';
      plants += '</g>';
    } else if(type.plant === 'grass'){
      plants += '<g transform="translate(' + x + ',' + y + ')">';
      plants += '<path d="M0 0 Q-3 ' + (-h*.6) + ' 0 ' + (-h) + '" stroke="#3a6028" stroke-width="1.5" fill="none" opacity="0.7"/>';
      plants += '<path d="M2 0 Q3 ' + (-h*.5) + ' 1 ' + (-h*.8) + '" stroke="#4a7030" stroke-width="1" fill="none" opacity="0.6"/>';
      plants += '</g>';
    } else {
      plants += '<g transform="translate(' + x + ',' + y + ')">';
      plants += '<path d="M0 0 Q2 ' + (-h*.4) + ' 0 ' + (-h) + ' Q-2 ' + (-h*.4) + ' 0 0" fill="' + gr + '" opacity="0.6"/>';
      plants += '</g>';
    }

  var empty = total === 0 ? '<text x="170" y="120" text-anchor="middle" font-size="11" fill="rgba(200,164,90,0.2)" font-family="serif" font-style="italic">Plant your first gratitude</text>' : '';
  
  var skyColor = 'hsl(' + (210-skyL*30) + ',' + (30+skyL*30) + '%,' + (6+skyL*8) + '%)';
  
  return '<svg viewBox="0 0 340 220" width="100%" height="' + size + '" style="display:block">'
    + '<defs><linearGradient id="sky' + id + '" x1="0%" y1="0%" x2="0%" y2="100%">'
    + '<stop offset="0%" stop-color="' + skyColor + '"/>'
    + '<stop offset="100%" stop-color="#0e1608"/>'
    + '</linearGradient></defs>'
    + '<rect width="340" height="220" fill="url(#sky' + id + ')"/>'
    + sun
    + '<path d="M0 140 L60 80 L120 130 L180 70 L240 120 L300 60 L340 100 L340 160 L0 160Z" fill="#0e1a0a" opacity="0.7"/>'
    + '<rect x="0" y="160" width="340" height="60" fill="#1a2210"/>'
    + '<rect x="0" y="155" width="340" height="15" fill="#253015" rx="2"/>'
    + water + plants
    + '<path d="M170 220 Q165 180 168 160" stroke="#3a3020" stroke-width="8" fill="none" opacity="0.35" stroke-linecap="round"/>'

// ─── SVG: Dojo ─────────────────────────────────────────────────────────────
function dojoSVG(trials, size){
  size = size || 200;
  var total = trials.length;
  var pts = trials.reduce(function(a,t){ return a + DOJO_TIERS[t.tier].pts; }, 0);
  var lvl = Math.min(10, Math.floor(pts/8));
  var cuts = Math.min(total, 25);
  
  // Cut marks on post
  var cutMarks = '';
  for(var i=0; i<cuts; i++){
    var y = 30 + i*(90/25);
    var tier = (trials[i] && trials[i].tier) || 'abhyas';
    var col = DOJO_TIERS[tier].color;
    var sw = tier==='agni' ? 2.5 : 1.5;
    var op = tier==='agni' ? 0.9 : 0.6;
    cutMarks += '<line x1="175" y1="' + y + '" x2="215" y2="' + (y+4) + '" stroke="' + col + '" stroke-width="' + sw + '" opacity="' + op + '"/>';
  }
  
  // Second post at level 4
  var post2 = '';
  if(lvl >= 4){
    post2 += '<rect x="245" y="20" width="18" height="110" fill="#3a2810" rx="2"/>';
    post2 += '<rect x="242" y="110" width="24" height="8" fill="#2a1808" rx="1"/>';
    var cuts2 = Math.min(total > 15 ? total-15 : 0, 20);
    for(var j=0; j<cuts2; j++){
      var y2 = 28 + j*(80/20);
      var t2 = (trials[j+15] && trials[j+15].tier) || 'abhyas';
      post2 += '<line x1="239" y1="' + y2 + '" x2="269" y2="' + (y2+3) + '" stroke="' + DOJO_TIERS[t2].color + '" stroke-width="1.5" opacity="0.5"/>';
    }
  }
  
  // Sword angle increases with level
  var swordAngle = -30 + lvl*3;
  var crown = lvl>=5 ? '<path d="M-8 -44 L-5 -52 L0 -47 L5 -52 L8 -44 Z" fill="#d4af37" opacity="0.8"/>' : '';
  var quote = total > 0 ? MUSASHI_QUOTES[total % MUSASHI_QUOTES.length].substring(0, 55) + '...' : '';
  
  return '<svg viewBox="0 0 340 180" width="100%" height="' + size + '" style="display:block">'
    + '<rect width="340" height="180" fill="#0a0c10"/>'
    + '<rect x="0" y="0" width="340" height="180" fill="rgba(200,164,90,0.03)"/>'
    + '<line x1="0" y1="148" x2="340" y2="148" stroke="rgba(200,164,90,0.07)" stroke-width="1"/>'
    + '<rect x="8" y="10" width="1" height="138" fill="rgba(200,164,90,0.05)"/>'
    + '<rect x="331" y="10" width="1" height="138" fill="rgba(200,164,90,0.05)"/>'
    + '<text x="30" y="75" font-size="26" fill="rgba(200,164,90,0.06)" font-family="serif">धर्म</text>'
    + '<text x="32" y="110" font-size="22" fill="rgba(200,164,90,0.04)" font-family="serif">कर्म</text>'
    + '<rect x="183" y="18" width="22" height="120" fill="#3a2810" rx="2"/>'
    + '<rect x="180" y="130" width="28" height="10" fill="#2a1808" rx="1"/>'
    + '<rect x="180" y="14" width="28" height="8" fill="#2a1808" rx="1"/>'
    + cutMarks + post2
    + '<g transform="translate(100,140)">'
    + '<ellipse cx="0" cy="10" rx="18" ry="4" fill="rgba(0,0,0,0.4)"/>'
    + '<path d="M-4 0 L-6 38" stroke="#c8a458" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>'
    + '<path d="M4 0 L8 38" stroke="#c8a458" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>'
    + '<ellipse cx="0" cy="-14" rx="9" ry="14" fill="#c8a458" opacity="0.82"/>'
    + '<circle cx="0" cy="-34" r="9" fill="#c8a458" opacity="0.85"/>'
    + '<rect x="-9" y="-38" width="18" height="4" fill="' + (lvl>=5?'#e8c060':'#8a6830') + '" rx="2" opacity="0.8"/>'
    + crown
    + '<g transform="rotate(' + swordAngle + ' 0 -20)">'
    + '<path d="M8 -20 L28 -32" stroke="#c8a458" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>'
    + '<line x1="28" y1="-32" x2="60" y2="-55" stroke="#d8d0c0" stroke-width="2" opacity="0.85"/>'
    + '<line x1="28" y1="-28" x2="36" y2="-28" stroke="#c8a040" stroke-width="3" opacity="0.7" stroke-linecap="round"/>'
    + '</g>'
    + '<path d="M-8 -20 L-18 -28" stroke="#c8a458" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.75"/>'
    + '<circle cx="-3" cy="-35" r="1.5" fill="#0a0804" opacity="0.8"/>'
    + '<circle cx="3" cy="-35" r="1.5" fill="#0a0804" opacity="0.8"/>'
    + '</g>'
    + (total > 0 ? '<text x="170" y="168" text-anchor="middle" font-size="8" fill="rgba(200,164,90,0.25)" font-family="serif" font-style="italic">"' + quote + '"</text>' : '')
    + '<text x="10" y="168" font-size="8" fill="rgba(200,164,90,0.2)" font-family="Cinzel,serif">' + cuts + ' strikes - ' + pts + ' power</text>'
    + '</svg>';
}

  <div class="fsec"><label class="fl">I - Domain</label><div class="chips">${domChips}</div></div>
  <div class="fsec"><label class="fl">II - The Habit</label>
    <input class="fi" id="iw" type="text" placeholder="e.g. 50 pushups every morning" value="${form.what}" oninput="onWhat(this.value)">${warn}</div>
  <div class="fsec"><label class="fl">III - Why This Matters</label>
    <input class="fi" type="text" placeholder="e.g. energy that compounds over decades" value="${form.why}" oninput="form.why=this.value;render()"></div>
  <div class="fsec"><label class="fl">IV - Anchor — When & Where</label>
    <input class="fi" type="text" placeholder="e.g. Right after I pour my morning coffee" value="${form.anchor}" oninput="form.anchor=this.value;render()">
    <div class="fhint">A specific when+where triples follow-through - Gollwitzer 1999</div></div>
  ${prev}
  <button class="sbtn ${canSub?'on':'off'}" onclick="submitHabit()">Consecrate This Vow →</button>`;
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function tapHabit(id){
  const t=today(); const h=state.habits.find(x=>x.id===id); if(!h) return;
  h.history[t]=!h.history[t]; save();
  const card=document.getElementById('c-'+id);
  if(card){
    if(h.history[t]){
      card.classList.add('done','strike');
      const g=card.querySelector('.cglow'); if(g){g.style.opacity='1';setTimeout(()=>g.style.opacity='0',600);}
      setTimeout(()=>card.classList.remove('strike'),350);
      if(totalOf(h.history)===GOAL){
        setTimeout(()=>{alert(`[pray] "${h.name}" — 66 Days Complete!\n\n${DEITY[h.deity||'nataraja']?.name} consecrated in your Trophy Hall.\n\nThe practice continues forever.\n\nॐ नमः शिवाय`);render();},400);
      }
    } else card.classList.remove('done');
    const hc=card.querySelector('.hchk');
    if(hc){hc.classList.toggle('done',!!h.history[t]);hc.textContent=h.history[t]?'✓':'';}
  }
}

function tapKindness(e){
  const p=state.pudhayal;
  if(p.lastDate!==today()){p.todayCoins=0;p.lastDate=today();}
  const prev=p.totalCoins; p.totalCoins++; p.todayCoins++;
  const justDone=Math.floor(p.totalCoins/COINS_PER_POT)>Math.floor(prev/COINS_PER_POT);
  save();
  for(let i=0;i<7;i++){setTimeout(()=>{
    const c=document.createElement('div'); c.className='coin-burst'; c.textContent='[coin]';
    const ang=Math.random()*Math.PI*2, dist=45+Math.random()*65;
    c.style.setProperty('--dx',Math.cos(ang)*dist+'px'); c.style.setProperty('--dy',Math.sin(ang)*dist+'px');
    const btn=document.getElementById('pudBtn');
    if(btn){const r=btn.getBoundingClientRect();c.style.left=(r.left+r.width/2)+'px';c.style.top=(r.top+r.height/2)+'px';}
    document.body.appendChild(c); setTimeout(()=>c.remove(),750);
  },i*55);}
  if(justDone){setTimeout(()=>{alert(`[coin] Pudhayal Complete!\n\n1000 acts of goodness.\nThe universe has received your offering.\n\nॐ`);render();},400);}
  else render();
}

function setHavanMode(m){havanMode=m;havanInput='';render();}
function offerToFire(){
  const txt=(document.getElementById('havanTxt')||{}).value||'';
  const text=txt.trim(); if(!text) return;
  if(!state.havan.offerings) state.havan.offerings=[];
  state.havan.offerings.push({text,type:havanMode,date:today(),ts:Date.now()});
  state.havan.totalOfferings=(state.havan.totalOfferings||0)+1;
  havanInput=''; save();
  const wrap=document.querySelector('[style*="text-align:center;margin-bottom:12px"]');
  render();
}

function setGardenType(t){gardenType=t;render();}
function plantGratitude(){
  const txt=(document.getElementById('gardenTxt')||{}).value||'';
  const text=txt.trim(); if(!text) return;
  if(!state.garden.entries) state.garden.entries=[];
  state.garden.entries.push({text,type:gardenType,date:today(),ts:Date.now()});
  state.garden.totalEntries=(state.garden.totalEntries||0)+1;
  gardenInput=''; save(); render();
}

function setDojoTier(t){dojoTier=t;render();}
function logStrike(){
  const txt=(document.getElementById('dojoTxt')||{}).value||'';
  const desc=txt.trim(); if(!desc) return;
  if(!state.dojo.trials) state.dojo.trials=[];
  state.dojo.trials.push({desc,tier:dojoTier,date:today(),ts:Date.now()});
  state.dojo.totalTrials=(state.dojo.totalTrials||0)+1;
  dojoInput=''; save();
  const wrap=document.querySelector('.dojo-wrap');
  if(wrap){wrap.style.boxShadow='0 0 25px rgba(200,164,90,0.3)';setTimeout(()=>wrap.style.boxShadow='',700);}
  render();
}

function setDomain(d){form.domain=d;render();}
function onWhat(v){form.what=v;const c=chkAmb(v);coach=c.big?c:null;render();}
function acceptTiny(){form.what=coach.max+' '+coach.unit;coach=null;render();setTimeout(()=>{const el=document.getElementById('iw');if(el)el.value=form.what;},10);}
function submitHabit(){
  if(!form.what||!form.why||!form.anchor||coach) return;
  const dom=DOMAINS.find(d=>d.id===form.domain);
  state.habits.push({
    id:'h'+Date.now(),name:form.what,domain:form.domain,
    emoji:dom?.emoji||'✨',deity:dom?.deity||'nataraja',
    anchor:form.anchor,why:form.why,history:{},
    color:dom?.color||'#c8a458',createdAt:today()
  });
  save(); form={what:'',why:'',anchor:'',domain:'spirit'}; coach=null; show('today');
}

// ─── Boot ──────────────────────────────────────────────────────────────────────
render();
</script>
